spring:
  application:
    name: navmate-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/navmate}
    username: ${SPRING_DATASOURCE_USERNAME:navmate}
    password: ${SPRING_DATASOURCE_PASSWORD:navmate}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  thymeleaf:
    cache: false

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

navmate:
  routing:
    similar-distance-threshold-meters: 4.0
    anchor-coverage-preference-weight: 2.0
    recovery-safety-weight: 3.0
