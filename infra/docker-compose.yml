version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: navmate-mongo
    environment:
      MONGO_INITDB_DATABASE: navmate_live
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
    container_name: navmate-backend
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGODB_URI: mongodb://mongo:27017/navmate_live
      PORT: 8080
      SEED_ON_START: "true"
    ports:
      - "8080:8080"

volumes:
  mongo-data:
